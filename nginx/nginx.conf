# STADO×Qwen demo nginx config.
#
# Deliberately simpler than the GCP stado-demo original: NO auth layer.
# Hackathon reviewers need frictionless access — the container serves the SPA
# and proxies the API/WS straight through. TLS terminates in the Caddy
# sidecar (see alibaba/README.md).
#
# - Single server block on :8080.
# - Serves the SPA from /usr/share/nginx/html.
# - Proxies /api/* and /ws (incl. /ws/voice — the Qwen Realtime bridge) to
#   the backend on 127.0.0.1:8000.

worker_processes auto;
pid /run/nginx.pid;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  75;
    server_tokens off;

    # WebSocket upgrade map.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_buffering     off;

    # Behind the Caddy TLS proxy the upstream port would otherwise leak into
    # 30x Location headers — keep all redirects relative.
    absolute_redirect off;

    log_format demo '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log demo;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 8080 default_server;
        server_name _;

        location = /_health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # /api/live  — backend liveness (204 from uvicorn).
        # /api/ready — 200 only when BOTH SITL drones are MAVLink-connected;
        #              the deploy script polls this before announcing the URL.
        location = /api/live  { access_log off; proxy_pass http://127.0.0.1:8000; proxy_http_version 1.1; proxy_set_header Host $host; }
        location = /api/ready { access_log off; proxy_pass http://127.0.0.1:8000; proxy_http_version 1.1; proxy_set_header Host $host; }

        location /ws {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|webp)$ {
                root /usr/share/nginx/html;
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
